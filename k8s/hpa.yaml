apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: issuance-hpa
  namespace: kube-credential
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: issuance-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: verification-hpa
  namespace: kube-credential
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: verification-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
